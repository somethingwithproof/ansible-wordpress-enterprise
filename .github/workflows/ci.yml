---
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run yamllint
        run: yamllint .

      - name: Link role for ansible-lint
        run: |
          mkdir -p .ansible/roles
          ln -s "$GITHUB_WORKSPACE" .ansible/roles/ansible-wordpress-enterprise

      - name: Run ansible-lint
        run: ansible-lint

  molecule-test:
    name: Molecule Test (${{ matrix.name }})
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20  # Prevent hung jobs
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: default
            name: Ubuntu 22/24 and Rocky 9
          - scenario: debian
            name: Debian (11, 12)
          - scenario: rhel
            name: RHEL (8, 9)
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Molecule and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install community.mysql
          ansible-galaxy collection install ansible.posix

      - name: Run Molecule test (${{ matrix.scenario }} scenario)
        run: molecule test --scenario-name ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

  integration-test:
    name: Integration Test
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15  # Prevent hung jobs
    needs: [molecule-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@0d103c3126aa41d772a8362f6aa67afac040f80c # v3

      - name: Build test image
        uses: docker/build-push-action@ca877d9245402d1537745e0e3563b6a5408e6e4d # v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: wordpress-ansible:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test with docker-compose
        run: |
          echo "Integration test skipped - Molecule tests cover functionality"
          # Docker compose integration test disabled as Molecule tests are comprehensive

  release:
    name: Release
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15  # Prevent hung jobs
    needs: [integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Get version from meta
        id: get_version
        run: |
          VERSION=$(grep 'version:' meta/main.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@de2c0eb89ae2a093354c5cb36e48c5e2b1c5d3e0 # v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Ansible Galaxy
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          ansible-galaxy role import --api-key ${{ secrets.GALAXY_API_KEY }} thomasvincent wordpress_enterprise
        continue-on-error: true
