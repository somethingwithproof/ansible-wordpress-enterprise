# SonarCloud configuration
# NOTE: projectKey and organization must match exactly what SonarCloud shows
# under your project's "Information" / organization settings. For projects
# auto-provisioned from a GitHub org the key is usually "<org>_<repo>".
sonar.projectKey=somethingwithproof_ansible-wordpress-enterprise
sonar.organization=somethingwithproof

# This is an Ansible role (YAML / Jinja / shell), so there is no compiled
# source tree. Scan the repo root and exclude generated / vendored / docs paths.
sonar.sources=.
sonar.exclusions=molecule/**, tests/**, docs/**, examples/**, **/*.md, .github/**
